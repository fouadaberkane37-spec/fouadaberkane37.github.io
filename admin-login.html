<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Groupe WMB</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf8f3;
            --charcoal: #2a2a2a;
            --sage: #6b8cb3;
            --soft-grey: #e8e4dc;
            --deep-green: #4a5f7b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 2px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 300;
            color: var(--charcoal);
            letter-spacing: -0.02em;
        }

        .logo p {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--sage);
            margin-top: 0.25rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--sage);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--soft-grey);
            border-radius: 2px;
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            color: var(--charcoal);
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus { border-color: var(--sage); }

        .error-msg {
            display: none;
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 0.75rem 1rem;
            border-radius: 2px;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }

        .error-msg.show { display: block; }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .remember-row input[type="checkbox"] { width: auto; margin: 0; }

        .remember-row label {
            margin: 0;
            font-size: 0.85rem;
            letter-spacing: 0;
            text-transform: none;
            color: var(--charcoal);
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--deep-green);
            color: white;
            border: none;
            border-radius: 2px;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover { background: var(--sage); }

        .role-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .role-owner    { background: #2a2a2a; color: white; }
        .role-manager  { background: #4a5f7b; color: white; }
        .role-sales    { background: #6b8cb3; color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>Groupe WMB</h1>
            <p>Admin Portal</p>
        </div>

        <div class="error-msg" id="errorMsg">Incorrect username or password.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" autofocus required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>

            <div class="remember-row">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Stay logged in on this device</label>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>

    <script>
        /*
         * ADMIN ACCOUNTS — update usernames/passwords as needed.
         * Roles: 'owner' | 'manager' | 'salesperson'
         *
         * owner      — full access: view all appointments, delete, export
         * manager    — view all appointments, create new bookings, export
         * salesperson — view own appointments, create new bookings
         */
        const ACCOUNTS = [
            { username: 'admin',   password: 'wmb2024',    role: 'owner',       name: 'Owner' },
            { username: 'manager', password: 'manager2024', role: 'manager',     name: 'Manager' },
            { username: 'john',    password: 'john2024',    role: 'salesperson', name: 'John Smith' },
            { username: 'sarah',   password: 'sarah2024',   role: 'salesperson', name: 'Sarah Johnson' },
            { username: 'michael', password: 'michael2024', role: 'salesperson', name: 'Michael Brown' },
            { username: 'emily',   password: 'emily2024',   role: 'salesperson', name: 'Emily Davis' },
        ];

        const redirect = new URLSearchParams(window.location.search).get('redirect') || 'appointments-calendar.html';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            const account = ACCOUNTS.find(a => a.username === username && a.password === password);

            if (account) {
                const store = document.getElementById('rememberMe').checked ? localStorage : sessionStorage;
                store.setItem('wmb_logged_in', 'true');
                store.setItem('wmb_user_role', account.role);
                store.setItem('wmb_user_name', account.name);
                store.setItem('wmb_username', account.username);
                window.location.href = redirect;
            } else {
                document.getElementById('errorMsg').classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
